spring.application.name=join
spring.config.import=optional:file:.env[.properties]
spring.profiles.default=dev
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=src/main/resources/static/uploads
app.upload.client-mode=direct

# CORS: 허용할 오리진 패턴 (쉼표 구분, 프로덕션 도메인 추가 가능)
# cors.allowed-origin-patterns=https://yourdomain.com,https://www.yourdomain.com

# Spring AI OpenAI(ChatGPT API) 설정 (optional - 키가 없어도 실행 가능)
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.enabled= false
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7

# Redis 캐시 설정 (토큰 절약을 위한 설정)
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000ms
spring.redis.password=
spring.redis.database=0

# 캐시 TTL 설정 (1시간)
spring.cache.redis.time-to-live=3600000
spring.cache.redis.key-prefix=ai-cache:
spring.cache.redis.use-key-prefix=true
spring.cache.type=redis

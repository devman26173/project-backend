spring.application.name=join
spring.config.import=optional:file:.env[.properties]
spring.profiles.default=dev
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=src/main/resources/static/uploads
app.upload.client-mode=direct

# Spring AI OpenAI(ChatGPT API) 설정
# AI Chat 기능 활성화: SPRING_AI_MODEL_CHAT=openai 및 OPENAI_API_KEY 환경변수 설정 필요
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.model.chat=${SPRING_AI_MODEL_CHAT:none}
# API key 없이 기동 시 Spring AI 자동 구성이 실행되지 않도록 비활성화
spring.ai.model.embedding=none
spring.ai.model.image=none
spring.ai.model.audio.speech=none
spring.ai.model.audio.transcription=none
spring.ai.model.moderation=none
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7
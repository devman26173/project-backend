<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>404 NOT FOUND</title>
    <link rel="stylesheet" th:href="@{/css/error.css}">
</head>
<body>
    <div class="mobile-container">
        <h1>Page cannot found</h1>
        <p>ご指定のページは存在しません。</p>
        <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
            <a href="/"
               style="display:inline-block; padding:8px 14px; border:1px solid #ccc; border-radius:8px; text-decoration:none; color:#333;">
                ホームへ
            </a>
            <button type="button"
                    onclick="history.back()"
                    style="padding:8px 14px; border:1px solid #ccc; border-radius:8px; background:#fff; color:#333; cursor:pointer;">
                前のページへ
            </button>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th = "http://www.thymeleaf.org">
	<head>
		<meta charset = "UTF-8">
		<meta name = "viewport" content = "width=device-width, initial-scale = 1.0">
		<title>投稿作成- FoodBoard</title>
		
		<!--Bootstrap CSS-->
		<link href = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
		<link rel="stylesheet" th:href="@{/css/bottom-nav.css}">
		<style>
					/* 앱 형태의 중앙 정렬 레이아웃 */
					.mobile-container {
					    max-width: 430px;    /* 최신 아이폰 프로 맥스 정도의 너비 */
					    margin: 0 auto;      /* 화면 중앙 정렬 */
					    min-height: 100vh;   /* 최소 높이를 화면 전체로 */
					    background-color: #ffffff;
					    border-left: 1px solid #f0f0f0;
					    border-right: 1px solid #f0f0f0;
					    display: flex;
					    flex-direction: column;
					    padding: 0;          /* 내부 여백 초기화 */
					}

					/* 스크롤 시 헤더 고정 (선택 사항) */
					header {
					    position: sticky;
					    top: 0;
					    z-index: 1020;
					    width: 100%;
					}
					</style>	
	</head>
		<body th:attr="data-upload-mode=${uploadClientMode}">
			<div class = "container-fluid px-0">
				<div class="mobile-container">
				<form th:action="@{/board/write}" method="post">
				<!--주황색 헤더 부분-->
				
				<header class = "d-flex justify-content-between align-items-center py-3 px-3"
						style = "background-color: #ffecd9; min-height: 85px;">
					<!--뒤로 가기 버튼-->
					<a th:href = "@{/board}"
					   class="d-inline-flex align-items-center justify-content-center" 
					   style="cursor: pointer; font-size: 24px; line-height: 1; width: 24px; height: 24px; text-decoration: none; color: black;">〈</a>
					<h5 class = "mb-0 fw-bold">投稿</h5>
					<button type="submit" class="btn p-0 fw-bold" style="font-size: 16px; color: black; border: none; background: none;">完了</button>
		
				</header>
					
				
					
						
					<!--제목-->
					<div class = "mt-3 px-3">
						<input type = "text" name="title"
								class = "form-control border-0 fs-5"
								placeholder="タイトルを入力"><hr class="mt-1">
					</div>
					<!--지역 선택-->
					<div class = "mt-3 px-3">
						<div class = "border rounded p-3 bg-light border" style = "background-color: #f8f9fa;">
							<div class = "small mb-2 text-muted">エリアを選択</div>
							
							<div class = "d-flex gap-2 mb-2">
								<!--지방 선택-->
								<select class = "form-select" id = "regionSelect" name="region" required>
									<option value="" selected disabled>地方を選択</option>
										<option value="北海道・東北">北海道・東北</option>
										<option value="関東">関東</option>	
									    <option value="中部">中部</option>
									    <option value="近畿">近畿</option>
									    <option value="中国・四国">中国・四国</option>
									    <option value="九州・沖縄">九州・沖縄</option>
									</select>
								
								<select class = "form-select" id = "prefectureSelect" name="prefecture" required>
									<option selected>都道府県</option>
									</select>
						</div>
								
						</div>
						</div>		
							<!--별점 선택-->
							<div class = "mt-3 px-3">
								<div class = "border rounded p-3" style = "background-color: #f8f9fa;">
									<div class = "mb-2">評価を選択</div>	
									<div class = "d-flex gap-2">
										<span class = "star" style = "cursor:pointer; font-size: 24px;">☆</span>
										<span class = "star" style = "cursor:pointer; font-size: 24px;">☆</span>
										<span class = "star" style = "cursor:pointer; font-size: 24px;">☆</span>
										<span class = "star" style = "cursor:pointer; font-size: 24px;">☆</span>
										<span class = "star" style = "cursor:pointer; font-size: 24px;">☆</span>
										<input type="hidden" name="rating" id="ratingInput" value="0">	
									</div>
								</div>
										
							<div class = "mt-3 px-3">
								<textarea name="content" class = "form-control border"
											placeholder="内容を入力"
											rows="10" style="resize: none;"></textarea>
										</div>
										
										<!-- 이미지 업로드 영역 -->
										<div class="mt-3 px-3 mb-5">
										    <div class="border rounded p-3" style="background-color: #f8f9fa;">
										        <div class="mb-2">画像を追加 (最大5枚)</div>
										        
										        <!-- 파일 선택 버튼 -->
										        <input type="file" 
										               id="imageInput" 
										               accept="image/*" 
										               capture="environment"
													   multiple
										               style="display: none;">
										        
										        <button type="button" 
										                class="btn btn-warning w-100 mb-2" 
										                onclick="document.getElementById('imageInput').click()">
										            📷 画像を選択(複数可)
										        </button>
										        
										        <!-- 드래그&드롭 영역 -->
										        <div id="dropZone" 
										             class="border border-2 border-dashed rounded p-3 text-center"
										             style="cursor: pointer; background-color: white;">
										            <p class="mb-0 text-muted small">
														ドラッグ＆ドロップ / 貼り付け (Ctrl+V)
													</p>
												</div>
										        
												<!-- 이미지 미리보기 (여러 개) -->
												<div id="imagePreviewContainer" class="mt-3" style="display: none;">
												    <div id="imagePreviewList" class="d-flex flex-wrap gap-2"></div>
												</div>
										        
												<!-- 실제 전송될 URL들 (hidden, 쉼표로 구분) -->
												   <input type="hidden" name="imageUrls" id="imageUrls">
												   </div>
										</div>
									</form> 
								</div> 
							</div>				
								
					  <!--Bootstrap JS-->
					   <script src = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
					   <script>
						const stars = document.querySelectorAll('.star');
						const ratingInput = document.getElementById('ratingInput');
						stars.forEach(function(star, index){
						            star.addEventListener('click', function(){
						                const rating = index + 1;
						                ratingInput.value = rating; 
						                stars.forEach(function(s){ s.textContent = '☆'; });
						                for (let i = 0; i <= index ; i++){ stars[i].textContent = '★'; }
						            });
						        });
						
						const regionData = {
								'すべて': [],
								'北海道・東北': ['北海道', '青森県', '岩手県', '宮城県', '秋田県', '山形県', '福島県'],
								'関東': ['東京都', '神奈川県', '千葉県', '埼玉県', '茨城県', '栃木県', '群馬県'],
								'中部': ['愛知県', '静岡県', '岐阜県', '三重県', '新潟県', '富山県', '石川県', '福井県', '山梨県', '長野県'],
								'近畿': ['大阪府', '兵庫県', '京都府', '滋賀県', '奈良県', '和歌山県'],
								'中国・四国': ['鳥取県', '島根県', '岡山県', '広島県', '山口県', '徳島県', '香川県', '愛媛県', '高知県'],
								'九州・沖縄': ['福岡県', '佐賀県', '長崎県', '熊本県', '大分県', '宮崎県', '鹿児島県', '沖縄県']
							};
							
							const regionSelect = document.getElementById('regionSelect');
							const prefectureSelect = document.getElementById('prefectureSelect');
							
							regionSelect.addEventListener('change', function(){
								const selectedRegion = this.value;
								prefectureSelect.innerHTML = '<option value="" selected disabled>都道府県</option>';
								const prefectures = regionData[selectedRegion];
								
								if(prefectures){
									prefectures.forEach(function(prefecture){
										const option = document.createElement('option');
										option.value = prefecture;
										option.textContent = prefecture; 
										prefectureSelect.appendChild(option);
										});
									}
							});
						</script>
						<script>
						    const imageInput = document.getElementById('imageInput');
						    const dropZone = document.getElementById('dropZone');
						    const imagePreviewContainer = document.getElementById('imagePreviewContainer');
						    const imagePreviewList = document.getElementById('imagePreviewList');
						    const imageUrlsInput = document.getElementById('imageUrls');
						    const uploadMode = document.body.dataset.uploadMode || 'server';
						    
						    let uploadedImages = []; // 업로드된 이미지 URL 배열
						    const MAX_IMAGES = 5;
						    
						    // 파일 선택 시 (여러 개 가능)
						    imageInput.addEventListener('change', function(e) {
						        const files = Array.from(e.target.files);
						        uploadMultipleImages(files);
						    });
						    
						    // 드래그 오버
						    dropZone.addEventListener('dragover', function(e) {
						        e.preventDefault();
						        dropZone.style.backgroundColor = '#fff3cd';
						        dropZone.style.borderColor = '#ffc107';
						    });
						    
						    // 드래그 leave
						    dropZone.addEventListener('dragleave', function(e) {
						        e.preventDefault();
						        dropZone.style.backgroundColor = 'white';
						        dropZone.style.borderColor = '#dee2e6';
						    });
						    
						    // 드롭
						    dropZone.addEventListener('drop', function(e) {
						        e.preventDefault();
						        dropZone.style.backgroundColor = 'white';
						        dropZone.style.borderColor = '#dee2e6';
						        
						        const files = Array.from(e.dataTransfer.files).filter(file => file.type.startsWith('image/'));
						        if (files.length > 0) {
						            uploadMultipleImages(files);
						        } else {
						            alert('画像ファイルのみアップロード可能です');
						        }
						    });
						    
						    // 붙여넣기
						    document.addEventListener('paste', function(e) {
						        const items = Array.from(e.clipboardData.items);
						        const imageFiles = items
						            .filter(item => item.type.startsWith('image/'))
						            .map(item => item.getAsFile());
						        
						        if (imageFiles.length > 0) {
						            uploadMultipleImages(imageFiles);
						        }
						    });
						    
						    // 여러 이미지 업로드
						    function uploadMultipleImages(files) {
						        // 최대 개수 체크
						        if (uploadedImages.length + files.length > MAX_IMAGES) {
						            alert(`画像は最大${MAX_IMAGES}枚までアップロード可能です`);
						            return;
						        }
						        
						        // 각 파일 업로드
						        files.forEach(file => uploadSingleImage(file));
						    }
						    
						    // 단일 이미지 업로드
						    function uploadSingleImage(file) {
						        // 파일 크기 체크
						        if (file.size > 10 * 1024 * 1024) {
						            alert('ファイルサイズは10MB以下にしてください');
						            return;
						        }
						        
						        // 로딩 표시
						        showLoading();

						        let uploadPromise;
						        if (uploadMode === 'direct') {
						            uploadPromise = fetch('/api/uploads/presign', {
						                method: 'POST',
						                headers: {
						                    'Content-Type': 'application/json'
						                },
						                body: JSON.stringify({
						                    fileName: file.name,
						                    contentType: file.type,
						                    fileSize: file.size
						                })
						            })
						            .then(response => {
						                if (!response.ok) {
						                    throw new Error('アップロード失敗');
						                }
						                return response.json();
						            })
						            .then(data => fetch(data.uploadUrl, {
						                method: 'PUT',
						                headers: {
						                    'Content-Type': file.type
						                },
						                body: file
						            }).then(uploadResponse => {
						                if (!uploadResponse.ok) {
						                    throw new Error('R2へのアップロードに失敗しました');
						                }
						                return data;
						            }));
						        } else {
						            const formData = new FormData();
						            formData.append('file', file);
						            uploadPromise = fetch('/api/uploads/image', {
						                method: 'POST',
						                body: formData
						            }).then(response => {
						                if (!response.ok) {
						                    throw new Error('アップロード失敗');
						                }
						                return response.json();
						            });
						        }
						        uploadPromise
						        .then(data => {
						            if (data.publicUrl) {
						                uploadedImages.push(data.publicUrl);
						                updateImagePreview();
						                updateImageUrlsInput();
						            } else {
						                alert(data.error || 'アップロード失敗');
						            }
						            hideLoading();
						        })
						        .catch(error => {
						            alert('アップロードエラー: ' + error.message);
						            console.error('Upload error:', error);
						            hideLoading();
						        });
						    }
						    
						    // 미리보기 업데이트
						    function updateImagePreview() {
						        imagePreviewList.innerHTML = '';
						        
						        uploadedImages.forEach((url, index) => {
						            const imageWrapper = document.createElement('div');
						            imageWrapper.className = 'position-relative';
						            imageWrapper.style.width = '100px';
						            
						            imageWrapper.innerHTML = `
						                <img src="${url}" class="rounded" style="width: 100px; height: 100px; object-fit: cover;">
						                <button type="button" 
						                        class="btn btn-danger btn-sm position-absolute top-0 end-0 m-1" 
						                        style="padding: 2px 6px; font-size: 12px;"
						                        onclick="removeImage(${index})">
						                    ✕
						                </button>
						            `;
						            
						            imagePreviewList.appendChild(imageWrapper);
						        });
						        
						        // 미리보기 영역 표시
						        if (uploadedImages.length > 0) {
						            imagePreviewContainer.style.display = 'block';
						            dropZone.style.display = 'none';
						        } else {
						            imagePreviewContainer.style.display = 'none';
						            dropZone.style.display = 'block';
						        }
						    }
						    
						    // hidden input 업데이트 (쉼표로 구분)
						    function updateImageUrlsInput() {
						        imageUrlsInput.value = uploadedImages.join(',');
						    }
						    
						    // 이미지 삭제
						    window.removeImage = function(index) {
						        uploadedImages.splice(index, 1);
						        updateImagePreview();
						        updateImageUrlsInput();
						        imageInput.value = ''; // input 초기화
						    };
						    
						    // 로딩 표시
						    function showLoading() {
						        dropZone.innerHTML = '<p class="mb-0"><span class="spinner-border spinner-border-sm me-2"></span>アップロード中...</p>';
						    }
						    
						    // 로딩 숨기기
						    function hideLoading() {
						        dropZone.innerHTML = `
						            <p class="mb-0 text-muted small">
						                ドラッグ＆ドロップ / 貼り付け (Ctrl+V)
						            </p>
						        `;
						    }
							
											
						</script>
						
				</body>
				</html>
